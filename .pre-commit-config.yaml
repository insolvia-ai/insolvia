# Local hooks that mirror the PR checks. Install with:
#   pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict

  # Dart/Flutter formatting is enforced in CI via `melos run format`; run it
  # locally before committing:  melos run format
