# Melos drives multi-package tasks across the Insolvia workspace.
# Workspace membership itself is declared in the root pubspec.yaml
# (`workspace:`); Melos 6+ reads that and layers scripts on top.
#
#   dart pub global activate melos     # one-time
#   melos bootstrap                    # resolve all packages
#   melos run analyze                  # analyze everything
#   melos run test                     # test everything
name: insolvia

command:
  bootstrap:
    # Keep a single lockfile at the workspace root.
    runPubGetInParallel: false

scripts:
  analyze:
    description: Static-analyze every package.
    run: dart analyze --fatal-infos
    exec:
      concurrency: 1

  format:
    description: Format all Dart sources (fails if anything changes).
    run: dart format --output=none --set-exit-if-changed .

  test:
    description: Run the Flutter test suite in every package that has one.
    run: flutter test
    packageFilters:
      dirExists: test

  tokens:
    description: >-
      Regenerate the Dart tokens and Tailwind theme.css from
      packages/insolvia_tokens/tokens.json.
    run: dart run packages/insolvia_tokens/tool/generate_tokens.dart

  tokens:check:
    description: >-
      Fail if any generated token file has drifted from tokens.json (i.e.
      someone hand-edited a generated file instead of the source of truth).
    run: dart run packages/insolvia_tokens/tool/generate_tokens.dart --check

  ci:
    description: The exact gate CI runs — token drift, format check, analyze, test.
    steps:
      - tokens:check
      - format
      - analyze
      - test
