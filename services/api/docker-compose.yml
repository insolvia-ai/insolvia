# Local dev for services/api — `docker compose up --build`, then
# `curl http://127.0.0.1:8080/health`.
#
# Mirrors andreas-services/mailer/docker-compose.yml: mailer runs Mailpit as
# its local backing service; here that slot is amazon/dynamodb-local, so the
# compose stack exercises the real DynamoDB waitlist adapter end-to-end
# (dynamodb-init creates the table with the same PK/SK schema the infra PR
# provisions). Running the development server WITHOUT compose still works:
# with WAITLIST_TABLE_NAME unset it falls back to the in-memory store and
# logs each submission instead of persisting it.
services:
  api:
    build:
      context: .
      target: development
    environment:
      INSOLVIA_ENV: local
      WAITLIST_TABLE_NAME: insolvia-waitlist-local
      # Local-only override; load_config rejects it outside INSOLVIA_ENV=local.
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      # dynamodb-local accepts any credentials, but boto3 requires *some* —
      # these dummies never touch real AWS.
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully

  dynamodb-local:
    image: amazon/dynamodb-local:2.6.1
    # -inMemory: throwaway state, gone on `compose down` — it's a dev fixture,
    # not a datastore.
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory"]
    ports:
      - "127.0.0.1:8000:8000"

  # One-shot table creation matching the marketing waitlist schema: generic
  # PK/SK string keys, on-demand billing. `create-table` fails if the table
  # exists, so a describe-table guard keeps re-`up`s idempotent.
  dynamodb-init:
    image: amazon/aws-cli:2.22.35
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until aws dynamodb list-tables
        --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1;
        do sleep 1; done;
        aws dynamodb describe-table
        --endpoint-url http://dynamodb-local:8000
        --table-name insolvia-waitlist-local >/dev/null 2>&1 ||
        aws dynamodb create-table
        --endpoint-url http://dynamodb-local:8000
        --table-name insolvia-waitlist-local
        --attribute-definitions
        AttributeName=PK,AttributeType=S
        AttributeName=SK,AttributeType=S
        --key-schema
        AttributeName=PK,KeyType=HASH
        AttributeName=SK,KeyType=RANGE
        --billing-mode PAY_PER_REQUEST
