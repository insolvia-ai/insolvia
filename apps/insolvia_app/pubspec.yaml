name: insolvia_app
description: >-
  The Insolvia app — cross-platform (desktop + web) bankruptcy case preparation.
  Currently a themed hello-world that imports the Insolvia design system.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

# Part of the Insolvia pub workspace (root pubspec.yaml).
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Declarative routing (Flutter-recommended router).
  go_router: ^17.3.0
  # The shared design system, consumed as a published, versioned artifact — a
  # git dependency pinned to a version tag — never the source by path. Upgrading
  # means bumping `ref` to the new tag. To hack on the design system live, use
  # the uncommitted pubspec_overrides.yaml recipe in docs/PACKAGE_PUBLISHING.md
  # (also under CLAUDE.md → "Flutter app"); delete it before committing.
  insolvia_design_system:
    git:
      url: https://github.com/insolvia-ai/insolvia.git
      path: packages/insolvia_design_system
      ref: insolvia_design_system-v0.1.1
  # The typed Insolvia API client, a workspace member resolved by path within
  # the monorepo (unlike the design system it has no published artifact yet).
  # No feature consumes it — it is wired here alongside apiBaseUrl
  # (lib/src/config/environment.dart) so the first API-backed feature only
  # has to import it.
  insolvia_api_client:
    path: ../../packages/insolvia_api_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
