name: insolvia_app
description: >-
  The Insolvia app — cross-platform (desktop + web) bankruptcy case preparation.
  Currently a themed hello-world that imports the Insolvia design system.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

# Part of the Insolvia pub workspace (root pubspec.yaml).
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Declarative routing (Flutter-recommended router).
  go_router: ^17.3.0
  # The shared design system, resolved by path within the monorepo.
  insolvia_design_system:
    path: ../../packages/insolvia_design_system
  # The typed Insolvia API client, resolved by path within the monorepo.
  # No feature consumes it yet — it is wired here alongside apiBaseUrl
  # (lib/src/config/environment.dart) so the first API-backed feature only
  # has to import it.
  insolvia_api_client:
    path: ../../packages/insolvia_api_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
