name: Infra · Terraform apply · Shared

on:
  push:
    branches: [main]
    paths:
      - "infra/envs/shared/**"
      - "infra/modules/**"
      - ".github/workflows/shared-infra-deploy.yml"
  workflow_dispatch:

# ⚠️ The FIRST apply of infra/envs/shared had to be done by a human, locally,
# after `terraform import aws_route53_zone.main Z01038711J6IZ68FD6ZDW`
# (#13 / 1.1b) — the insolvia.ai hosted zone was created outside Terraform,
# and applying with empty state would have created a SECOND zone, with Gandi
# still delegating to the original and ACM validation silently hanging. That
# import has landed in state; every apply since is this workflow.
permissions:
  id-token: write
  contents: read

concurrency:
  group: insolvia-shared-infra
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    # Mirrors the third Terraform environment: `shared` owns account-wide
    # resources (hosted zone, wildcard cert, OIDC trust anchor, mail DNS) and
    # has its own state key, so it gets its own GitHub environment rather than
    # borrowing production's. That keeps the blast radii separate — this job
    # must not be able to read production's secrets as they accumulate.
    #
    # Declaring an environment is also what makes environment-scoped secrets
    # visible at all: with no `environment:` key, a `secrets.*` reference
    # silently resolves to an empty string rather than erroring.
    environment: insolvia-shared
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Apply shared
        run: |
          terraform -chdir=infra/envs/shared init
          terraform -chdir=infra/envs/shared apply -auto-approve
