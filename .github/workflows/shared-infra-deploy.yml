name: Infra · Terraform apply · Shared

on:
  push:
    branches: [main]
    paths:
      - "infra/envs/shared/**"
      - "infra/modules/**"
      - ".github/workflows/shared-infra-deploy.yml"
  workflow_dispatch:

# Gated behind the DEPLOY_ENABLED repo variable, currently 'false'.
# DNS is live; the gate waits on shared infra being applied (#15) and the
# ACM cert reaching ISSUED (#16).
#
# ⚠️ The FIRST apply of infra/envs/shared must be done by a human, locally,
# and must `terraform import aws_route53_zone.main Z01038711J6IZ68FD6ZDW`
# first (#13 / 1.1b). The insolvia.ai hosted zone was created outside
# Terraform; applying with empty state creates a SECOND zone, Gandi keeps
# delegating to the original, and ACM validation silently hangs. Do not
# enable this workflow until that import has landed in state.
permissions:
  id-token: write
  contents: read

concurrency:
  group: insolvia-shared-infra
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    # Mirrors the third Terraform environment: `shared` owns account-wide
    # resources (hosted zone, wildcard cert, OIDC trust anchor, inbound mail)
    # and has its own state key, so it gets its own GitHub environment rather
    # than borrowing production's. That keeps the blast radii separate — this
    # job must not be able to read production's secrets as they accumulate.
    #
    # Declaring an environment is also what makes environment-scoped secrets
    # visible at all: with no `environment:` key, `secrets.INBOUND_FORWARD_TO`
    # silently resolves to an empty string.
    environment: insolvia-shared
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      # Fail loudly rather than silently writing the placeholder. If this secret
      # is empty, Terraform still succeeds and stores "TODO-set-via-secret" in
      # the SSM SecureString — then every forwarded mail fails as transient and
      # piles onto the DLQ, with a green pipeline and no error to point at.
      - name: Check the forward-to secret is present
        env:
          INBOUND_FORWARD_TO: ${{ secrets.INBOUND_FORWARD_TO }}
        run: |
          if [ -z "$INBOUND_FORWARD_TO" ]; then
            echo "::error::INBOUND_FORWARD_TO is empty. Set it on the insolvia-shared environment (Settings > Environments), not at repo level, or this job cannot see it. Refusing to apply and write a placeholder into SSM."
            exit 1
          fi
          echo "INBOUND_FORWARD_TO is set (${#INBOUND_FORWARD_TO} chars)."

      - name: Apply shared
        env:
          TF_VAR_inbound_forward_to: ${{ secrets.INBOUND_FORWARD_TO }}
        run: |
          terraform -chdir=infra/envs/shared init
          terraform -chdir=infra/envs/shared apply -auto-approve
