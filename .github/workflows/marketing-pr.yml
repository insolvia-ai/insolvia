name: Marketing · PR

# No `on.pull_request.paths:` filter, deliberately — see
# `.github/actions/changed-paths/action.yml`. This job is a required status
# check on `protect-main`, so it must trigger and report on *every* PR; the
# `steps.filter` guard below is what keeps an unrelated PR cheap. Re-adding a
# `paths:` filter would silently deadlock every PR that does not touch these
# paths.
on:
  pull_request:

permissions:
  contents: read
  # The app installs @insolvia-ai/design-system from GitHub Packages; the
  # job's GITHUB_TOKEN needs read access to pull it.
  packages: read

defaults:
  run:
    working-directory: apps/insolvia_marketing

jobs:
  marketing:
    name: Marketing site
    runs-on: ubuntu-latest
    steps:
      # `actions/checkout` ignores `defaults.run.working-directory` (it is not a
      # `run` step), so it still clones into the workspace root as intended.
      - uses: actions/checkout@v4
        with:
          # Full history so the guard can diff against the PR base commit.
          fetch-depth: 0

      # Likewise a composite action, not a `run` step, so its git commands
      # execute at the repo root regardless of the `defaults` above.
      - id: filter
        uses: ./.github/actions/changed-paths
        with:
          paths: |
            # The app consumes the *published* @insolvia-ai/design-system,
            # pinned by its lockfile — design-system (or token) source changes
            # cannot affect this gate. It re-runs when the app bumps the
            # dependency, because that edits package.json/package-lock.json
            # under apps/insolvia_marketing/**.
            apps/insolvia_marketing/**
            .github/workflows/marketing-pr.yml
            .github/actions/changed-paths/action.yml

      # Must match the app's `engines.node` (">=24").
      - uses: actions/setup-node@v4
        if: steps.filter.outputs.run == 'true'
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/insolvia_marketing/package-lock.json

      # `ci`, never `install`: the lockfile is committed precisely so CI
      # resolves the same tree twice running, and `ci` fails loudly when
      # package.json and the lockfile have drifted apart. The install is the
      # only step that touches the network — the lockfile pins
      # @insolvia-ai/design-system to GitHub Packages, which requires a token
      # even for public packages (the app's .npmrc expands NODE_AUTH_TOKEN).
      - name: Install
        if: steps.filter.outputs.run == 'true'
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        if: steps.filter.outputs.run == 'true'
        run: npm run typecheck

      - name: Lint
        if: steps.filter.outputs.run == 'true'
        run: npm run lint

      # react-router build emits build/client (hashed static assets) +
      # build/server (SSR bundle). The design system arrives prebuilt from the
      # registry — there is no prebuild step anymore.
      - name: Build
        if: steps.filter.outputs.run == 'true'
        run: npm run build

      # Core Web Vitals budget (issue #46). Being dramatically lighter and
      # faster than a Flutter-web build is the entire reason this site is React
      # and not Flutter — this step is what keeps that reasoning true. Budgets,
      # thresholds, and their rationale live in lighthouserc.json; it serves
      # the production build via scripts/lhci-serve.mjs and audits / and
      # /waitlist on Lighthouse's throttled mobile preset. ubuntu-latest ships
      # Chrome preinstalled.
      - name: Lighthouse budget
        if: steps.filter.outputs.run == 'true'
        run: npx --yes @lhci/cli@0.15.x autorun

      # The HTML reports make a budget failure debuggable without re-running
      # locally. Not a `run` step, so the path is from the repo root.
      - name: Upload Lighthouse reports
        if: failure() && steps.filter.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: apps/insolvia_marketing/.lighthouseci/reports
          retention-days: 7

      # Packaging check: the prod deploy ships this image, so catch Dockerfile
      # regressions here instead of at deploy time. Needs build/ from the Build
      # step above.
      - name: Docker build (packaging check)
        if: steps.filter.outputs.run == 'true'
        run: docker build -t insolvia-marketing:ci .
