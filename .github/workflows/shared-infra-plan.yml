name: Infra · Terraform plan · PR

on:
  pull_request:
    paths:
      - "infra/**"
      - ".tflint.hcl"
      - ".github/workflows/shared-infra-plan.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      # One environment failing should not cancel the others. With fail-fast on,
      # a flake in `prod` hides whether `shared` and `staging` actually pass, so
      # a re-run is the only way to learn anything.
      fail-fast: false
      matrix:
        env: [shared, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.62.0

      - name: Format check
        run: terraform fmt -check -recursive

      - name: TFLint
        # `tflint --init` pulls the AWS ruleset from the GitHub API. Without a
        # token that request is anonymous, and GitHub-hosted runners share
        # outbound IPs — so the 60/hr anonymous quota is routinely exhausted by
        # other tenants and the job dies on an unrelated 403:
        #   Failed to download tflint-ruleset-aws...: 403 API rate limit exceeded
        # The default GITHUB_TOKEN authenticates the download and removes the
        # whole failure class. It needs no extra permissions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tflint --init
          tflint --chdir=infra/envs/${{ matrix.env }} --recursive

      # Offline validation — no AWS credentials needed (backend disabled).
      - name: Validate ${{ matrix.env }}
        run: |
          terraform -chdir=infra/envs/${{ matrix.env }} init -backend=false
          terraform -chdir=infra/envs/${{ matrix.env }} validate
