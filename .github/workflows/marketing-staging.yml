name: Marketing · Deploy · Staging

# Deploys staging-www.insolvia.ai: SSR Lambda image + hashed client assets on
# S3, both behind one CloudFront distribution (infra/modules/marketing_site).
#
# The marketing site used to be production-only (issue #45, decision D2 —
# "production + PR previews only"). That is reversed: the SES production-access
# request (issue #80 / 6.8) is reviewed against a live privacy policy and a
# working unsubscribe path, and those need somewhere to be exercised before
# prod serves them. PR previews, the thing D2 leaned on instead, were never
# built. See infra/envs/staging/main.tf and docs/MVP_PLAN.md.
#
# Staging serves a full public copy of the site, and that is safe for SEO only
# because the app noindexes every host that is not exactly www.insolvia.ai
# (app/lib/seo.ts, issue #48) — staging robots.txt is `Disallow: /`. The smoke
# check below asserts that, because a staging copy that started ranking would
# compete with production for its own keywords.
#
# FIRST-EVER DEPLOY (bootstrap — manual, once): the SSR Lambda cannot be
# created until an image exists in the ECR repository, and this workflow's
# full `terraform apply` creates both. Bootstrap from a merged main checkout
# (see infra/modules/marketing_site/main.tf):
#
#   terraform -chdir=infra/envs/staging apply \
#     -target=module.marketing_site.aws_ecr_repository.ssr
#   # build the app, docker build, push <marketing_ecr_repository_url>:<tag>
#   terraform -chdir=infra/envs/staging apply
#
# After that the Lambda's image_uri is lifecycle-ignored and this workflow owns
# the running image via `aws lambda update-function-code`.
#
# Deploy workflows are not required status checks, so — unlike the *-pr.yml
# gates — a `paths:` filter here is safe (same as api-staging.yml).

on:
  push:
    branches: [main]
    paths:
      - "apps/insolvia_marketing/**"
      - "infra/envs/staging/**"
      - "infra/modules/marketing_site/**"
      - ".github/workflows/marketing-staging.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  # The app installs @insolvia-ai/design-system from GitHub Packages; the
  # job's GITHUB_TOKEN needs read access to pull it.
  packages: read

# Shared with every workflow that `terraform apply`s infra/envs/staging
# (api-staging.yml, app-staging.yml, mailer-staging.yml) — concurrent applies
# of one env race. See the matching comment in api-staging.yml for the
# incident that proved it.
concurrency:
  group: insolvia-terraform-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Required: environment-scoped secrets (AWS_ROLE_ARN) are invisible to jobs
    # that don't declare the environment — they resolve silently to "".
    environment: insolvia-staging
    steps:
      - uses: actions/checkout@v4

      # ── 1. Build the app ──────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/insolvia_marketing/package-lock.json

      # The only step that touches the network: the lockfile pins
      # @insolvia-ai/design-system to GitHub Packages, which requires a token
      # even for public packages (the app's .npmrc expands NODE_AUTH_TOKEN).
      - name: Install
        run: npm ci
        working-directory: apps/insolvia_marketing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build
        working-directory: apps/insolvia_marketing

      # ── 2. Infra: apply + read outputs ────────────────────────────
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          # The wrapper interleaves its own stdout, which corrupts
          # `$(terraform output -raw ...)` capture below.
          terraform_wrapper: false

      - name: Apply staging infra
        id: tf
        run: |
          terraform -chdir=infra/envs/staging init -input=false
          terraform -chdir=infra/envs/staging apply -auto-approve -input=false
          tf() { terraform -chdir=infra/envs/staging output -raw "$1"; }
          {
            echo "ecr=$(tf marketing_ecr_repository_url)"
            echo "lambda=$(tf marketing_ssr_function_name)"
            echo "bucket=$(tf marketing_assets_bucket_name)"
            echo "dist=$(tf marketing_distribution_id)"
            echo "url=$(tf marketing_url)"
          } >> "$GITHUB_OUTPUT"

      # ── 3. SSR image → ECR ────────────────────────────────────────
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build + push
        env:
          IMAGE: ${{ steps.tf.outputs.ecr }}
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
        working-directory: apps/insolvia_marketing

      # ── 4. Point the Lambda at the new image ──────────────────────
      - name: Update Lambda function code
        env:
          FUNCTION: ${{ steps.tf.outputs.lambda }}
          IMAGE: ${{ steps.tf.outputs.ecr }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --image-uri "$IMAGE:${{ github.sha }}" \
            --query '{FunctionName:FunctionName,CodeSize:CodeSize}' --output table
          aws lambda wait function-updated --function-name "$FUNCTION"

      # ── 5. Client assets → S3, then invalidate ────────────────────
      # Everything in build/client is content-hashed; HTML is SSR'd by the
      # Lambda, so unlike app-staging.yml there is no second no-cache HTML pass.
      - name: Sync assets to S3 + invalidate
        env:
          BUCKET: ${{ steps.tf.outputs.bucket }}
          DIST: ${{ steps.tf.outputs.dist }}
        run: |
          aws s3 sync apps/insolvia_marketing/build/client "s3://$BUCKET" --delete \
            --cache-control "public,max-age=31536000,immutable"
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"

      # ── 6. Smoke check ────────────────────────────────────────────
      # Unlike prod there is no apex to assert (staging owns no apex — see
      # infra/envs/staging/main.tf). Instead assert the thing that is specific
      # to a second public copy of the site: it must not be crawlable.
      - name: Smoke check
        env:
          URL: ${{ steps.tf.outputs.url }}
        run: |
          curl -sSf -o /dev/null --retry 5 --retry-delay 5 --retry-all-errors "$URL/"
          robots=$(curl -sSf "$URL/robots.txt")
          if ! grep -q '^Disallow: /$' <<< "$robots"; then
            echo "::error::staging robots.txt is not Disallow: / — a crawlable staging copy competes with production"
            echo "$robots"
            exit 1
          fi
          if ! curl -sSf "$URL/" | grep -qi 'name="robots" content="noindex'; then
            echo "::error::staging pages are missing the noindex meta tag (see app/lib/seo.ts isProductionHost)"
            exit 1
          fi
