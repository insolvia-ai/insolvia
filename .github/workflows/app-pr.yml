name: App · PR

# No `on.pull_request.paths:` filter, deliberately — see
# `.github/actions/changed-paths/action.yml`. Both jobs here are required status
# checks on `protect-main`, so they must trigger and report on *every* PR; the
# `steps.filter` guard below is what keeps an unrelated PR cheap. Re-adding a
# `paths:` filter would silently deadlock every PR that does not touch these
# paths.
on:
  pull_request:

permissions:
  contents: read

jobs:
  flutter-app:
    name: Flutter app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the guard can diff against the PR base commit.
          fetch-depth: 0

      - id: filter
        uses: ./.github/actions/changed-paths
        with:
          paths: |
            apps/**
            # Deliberately NOT packages/insolvia_design_system/** — the app is
            # insulated behind its tag-pinned git dependency (see
            # docs/PACKAGE_PUBLISHING.md). A design-system change cannot affect
            # this build until the app bumps `ref` in its own pubspec.yaml /
            # the root pubspec.lock, and apps/** + pubspec.lock below re-gate
            # exactly that PR.
            #
            # insolvia_tokens stays: it is a pub workspace member co-resolved
            # with the app by the root `flutter pub get`.
            packages/insolvia_tokens/**
            pubspec.yaml
            # The root workspace lockfile pins the app's resolved deps —
            # including the design-system tag's resolved commit.
            pubspec.lock
            melos.yaml
            analysis_options.yaml
            .github/workflows/app-pr.yml
            .github/actions/changed-paths/action.yml

      - uses: subosito/flutter-action@v2
        if: steps.filter.outputs.run == 'true'
        with:
          channel: stable
      - run: flutter pub get
        if: steps.filter.outputs.run == 'true'
      - name: Format check
        if: steps.filter.outputs.run == 'true'
        run: dart format --output=none --set-exit-if-changed apps/insolvia_app
      - name: Analyze
        if: steps.filter.outputs.run == 'true'
        run: dart analyze apps/insolvia_app
      - name: Test
        if: steps.filter.outputs.run == 'true'
        run: flutter test
        working-directory: apps/insolvia_app
      - name: Build web (verify)
        if: steps.filter.outputs.run == 'true'
        run: flutter build web --dart-define=INSOLVIA_ENV=staging
        working-directory: apps/insolvia_app

  build-macos:
    name: macOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: ./.github/actions/changed-paths
        with:
          paths: |
            apps/**
            # Deliberately NOT packages/insolvia_design_system/** — the app is
            # insulated behind its tag-pinned git dependency (see
            # docs/PACKAGE_PUBLISHING.md). A design-system change cannot affect
            # this build until the app bumps `ref` in its own pubspec.yaml /
            # the root pubspec.lock, and apps/** + pubspec.lock below re-gate
            # exactly that PR.
            #
            # insolvia_tokens stays: it is a pub workspace member co-resolved
            # with the app by the root `flutter pub get`.
            packages/insolvia_tokens/**
            pubspec.yaml
            # The root workspace lockfile pins the app's resolved deps —
            # including the design-system tag's resolved commit.
            pubspec.lock
            melos.yaml
            analysis_options.yaml
            .github/workflows/app-pr.yml
            .github/actions/changed-paths/action.yml

      - uses: subosito/flutter-action@v2
        if: steps.filter.outputs.run == 'true'
        with:
          channel: stable
      - run: flutter pub get
        if: steps.filter.outputs.run == 'true'
      - name: Build macOS (verify)
        if: steps.filter.outputs.run == 'true'
        run: flutter build macos --dart-define=INSOLVIA_ENV=staging
        working-directory: apps/insolvia_app
