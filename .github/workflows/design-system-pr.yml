name: Design system · PR

on:
  pull_request:
    paths:
      - "packages/**"
      - "pubspec.yaml"
      - "melos.yaml"
      - "analysis_options.yaml"
      - ".github/workflows/design-system-pr.yml"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve workspace
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed packages/insolvia_design_system

      - name: Analyze
        run: dart analyze packages/insolvia_design_system

      - name: Test
        run: flutter test
        working-directory: packages/insolvia_design_system
