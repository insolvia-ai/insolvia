name: Design system · PR

on:
  pull_request:
    paths:
      # Named per package rather than `packages/**` — that glob also matched
      # packages/insolvia_design_system_react/, firing the Flutter gate on
      # React-only PRs. A new Dart package adds its own line here.
      - "packages/insolvia_design_system/**"
      - "packages/insolvia_tokens/**"
      # The generated Tailwind theme lives in the React package, but it is an
      # output of the Dart generator — so the drift check that guards it has to
      # fire here. Without this line, a PR hand-editing only theme.css runs no
      # drift check at all: the React gate doesn't have one, and this gate
      # wouldn't trigger.
      - "packages/insolvia_design_system_react/src/styles/theme.css"
      - "pubspec.yaml"
      - "melos.yaml"
      - "analysis_options.yaml"
      - ".github/workflows/design-system-pr.yml"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve workspace
        run: flutter pub get

      # Must run before the format/analyze steps: if someone hand-edited a
      # generated file, the honest failure is "you edited the wrong file",
      # not a downstream lint complaint about the edit.
      - name: Token drift check
        run: dart run packages/insolvia_tokens/tool/generate_tokens.dart --check

      - name: Format check
        run: dart format --output=none --set-exit-if-changed packages/insolvia_tokens packages/insolvia_design_system

      - name: Analyze
        run: dart analyze packages/insolvia_tokens packages/insolvia_design_system

      - name: Test
        run: flutter test
        working-directory: packages/insolvia_design_system
