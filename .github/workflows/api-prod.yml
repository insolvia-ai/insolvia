name: API · Deploy · Production

# Steady-state deploy: apply the env, push a fresh image, point the Lambda at
# it, re-derive its environment from SSM, smoke-test /health.
#
# The FIRST deploy in a fresh environment cannot run through this workflow: an
# Image-package Lambda refuses to be created before its image exists, so the
# apply below deadlocks. Bootstrap once by hand, per
# infra/modules/api_service/main.tf:
#   1. terraform apply -target=module.api_service.aws_ecr_repository.api
#   2. docker build --target lambda services/api, tag <repo-url>:latest, push
#   3. terraform apply   (full)
# After that, every deploy is this workflow.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Shared with every workflow that `terraform apply`s infra/envs/prod
# (app-prod.yml, marketing-prod.yml) — the backend has no state locking, so
# concurrent applies of one env race. See the matching comment in
# api-staging.yml for the incident that proved it.
concurrency:
  group: insolvia-terraform-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: insolvia-production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          # The wrapper interposes on stdout, which corrupts the
          # `terraform output -raw` command substitutions below.
          terraform_wrapper: false

      - name: Apply prod infra
        id: tf
        run: |
          terraform -chdir=infra/envs/prod init
          terraform -chdir=infra/envs/prod apply -auto-approve
          {
            echo "repo=$(terraform -chdir=infra/envs/prod output -raw api_ecr_repository_url)"
            echo "function=$(terraform -chdir=infra/envs/prod output -raw api_lambda_function_name)"
            echo "domain=$(terraform -chdir=infra/envs/prod output -raw api_domain)"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to ECR
        env:
          REPO: ${{ steps.tf.outputs.repo }}
        run: |
          # The registry host is everything before the first `/` of the repo URL.
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin "${REPO%%/*}"

      - name: Build and push image
        env:
          REPO: ${{ steps.tf.outputs.repo }}
        run: |
          # `:sha` is the immutable deploy reference; `:latest` exists only so
          # a from-scratch `terraform apply` (whose Lambda seed points at
          # `:latest`) finds an image.
          docker build --target lambda \
            -t "$REPO:${{ github.sha }}" \
            -t "$REPO:latest" \
            services/api
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

      - name: Update Lambda code
        env:
          FUNCTION: ${{ steps.tf.outputs.function }}
          REPO: ${{ steps.tf.outputs.repo }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --image-uri "$REPO:${{ github.sha }}"
          aws lambda wait function-updated --function-name "$FUNCTION"

      - name: Re-derive Lambda environment from SSM
        env:
          FUNCTION: ${{ steps.tf.outputs.function }}
        run: |
          # /insolvia/prod/api/<kebab-key> -> KEBAB_KEY:
          #   insolvia-env        -> INSOLVIA_ENV  (= "production"; the infra
          #                          env is "prod", the app-level value is not —
          #                          the SSM parameter records that mapping)
          #   waitlist-table-name -> WAITLIST_TABLE_NAME
          # Terraform ignores `environment` drift on the Lambda (see
          # infra/modules/api_service/main.tf) — this step owns it.
          environment="$(
            aws ssm get-parameters-by-path \
              --path /insolvia/prod/api \
              --with-decryption \
              --query 'Parameters[].{Name:Name,Value:Value}' \
              --output json \
            | jq -c 'map({key: (.Name | split("/") | last | ascii_upcase | gsub("-"; "_")), value: .Value})
                     | {Variables: from_entries}'
          )"
          # Refuse to ship nonsense: an empty or half-applied namespace would
          # otherwise silently wipe every variable the service reads.
          echo "$environment" | jq -e '.Variables.INSOLVIA_ENV == "production"' > /dev/null
          aws lambda update-function-configuration \
            --function-name "$FUNCTION" \
            --environment "$environment"
          aws lambda wait function-updated --function-name "$FUNCTION"

      - name: Smoke test
        env:
          DOMAIN: ${{ steps.tf.outputs.domain }}
        run: |
          curl -sSf "https://$DOMAIN/health" | tee health.json
          jq -e '.environment == "production"' health.json > /dev/null
