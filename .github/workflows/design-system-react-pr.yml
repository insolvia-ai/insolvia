name: Design system React · PR

# No `on.pull_request.paths:` filter, deliberately — see
# `.github/actions/changed-paths/action.yml`. This job is a required status
# check on `protect-main`, so it must trigger and report on *every* PR; the
# `steps.filter` guard below is what keeps an unrelated PR cheap. Re-adding a
# `paths:` filter would silently deadlock every PR that does not touch these
# paths.
on:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/insolvia_design_system_react

jobs:
  react-design-system:
    name: React design system
    runs-on: ubuntu-latest
    steps:
      # `actions/checkout` ignores `defaults.run.working-directory` (it is not a
      # `run` step), so it still clones into the workspace root as intended.
      - uses: actions/checkout@v4
        with:
          # Full history so the guard can diff against the PR base commit.
          fetch-depth: 0

      # Likewise a composite action, not a `run` step, so its git commands
      # execute at the repo root regardless of the `defaults` above.
      - id: filter
        uses: ./.github/actions/changed-paths
        with:
          paths: |
            packages/insolvia_design_system_react/**
            packages/insolvia_tokens/**
            .github/workflows/design-system-react-pr.yml
            .github/actions/changed-paths/action.yml

      # Must match the package's `engines.node` (">=24").
      - uses: actions/setup-node@v4
        if: steps.filter.outputs.run == 'true'
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/insolvia_design_system_react/package-lock.json

      # Version-bump gate. Every merge to main that changes this package must
      # bump `version` in package.json, because the publish workflow
      # (design-system-react-publish.yml) is idempotent by version: it skips
      # cleanly when package.json's version already exists in the registry. An
      # unbumped package change therefore merges green, publishes nothing, and
      # silently rots the registry — consumers (the marketing site) install the
      # published package, never the source by path, so they would keep
      # building against a stale artifact with no error anywhere.
      #
      # The `steps.filter` guard above also matches tokens/workflow paths that
      # don't touch the package, so this step re-diffs against the PR base and
      # only demands a bump when something under the package directory actually
      # changed. Checkout uses `fetch-depth: 0`, so the base commit is present.
      # Mirrors the changed-paths action's fail-loud philosophy: if the base
      # package.json cannot be read, that is a hard error, never a silent pass.
      - name: Require a version bump when the package changed
        if: steps.filter.outputs.run == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # Only changes inside the package itself require a bump. `-- .` is
          # relative to the working-directory default, i.e. this package.
          if git diff --quiet "$BASE_SHA" HEAD -- .; then
            echo "No changes under packages/insolvia_design_system_react/ — no version bump required."
            exit 0
          fi

          # `git show` exits non-zero if the base commit or the file is
          # missing; with `set -e` that fails the step loudly instead of
          # letting a broken guard wave the PR through.
          BASE_PKG="$(git show "$BASE_SHA:packages/insolvia_design_system_react/package.json")"
          BASE_VERSION="$(node -p 'JSON.parse(process.argv[1]).version' "$BASE_PKG")"
          HEAD_VERSION="$(node -p "require('./package.json').version")"

          if [ "$HEAD_VERSION" = "$BASE_VERSION" ]; then
            echo "::error file=packages/insolvia_design_system_react/package.json::This PR changes packages/insolvia_design_system_react/ but leaves version at $BASE_VERSION. This package publishes on every merge to main; bump \`version\` in package.json — consumers install the published package."
            exit 1
          fi

          echo "Version bumped: $BASE_VERSION -> $HEAD_VERSION."

      # `ci`, never `install`: the lockfile is committed precisely so CI
      # resolves the same tree twice running, and `ci` fails loudly when
      # package.json and the lockfile have drifted apart.
      - name: Install
        if: steps.filter.outputs.run == 'true'
        run: npm ci

      - name: Lint
        if: steps.filter.outputs.run == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.filter.outputs.run == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.filter.outputs.run == 'true'
        run: npm run test

      - name: Build
        if: steps.filter.outputs.run == 'true'
        run: npm run build

      # Kept in the gate. `tsc` already covers the stories (tsconfig includes
      # `src` and `.storybook`), but only Storybook exercises the Vite +
      # Tailwind-v4 pipeline: the `@tailwindcss/vite` plugin actually compiling
      # the generated `theme.css`, and the addon/framework wiring in
      # `.storybook/`. Neither `tsup` nor `vitest` touches that path, and it is
      # where the real breakage showed up during development. Costs ~4s.
      - name: Build Storybook
        if: steps.filter.outputs.run == 'true'
        run: npm run build-storybook
