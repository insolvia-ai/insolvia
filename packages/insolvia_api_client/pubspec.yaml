name: insolvia_api_client
description: >-
  A hand-written, typed Dart client for the Insolvia API (services/api).
  Covers the current surface — GET /health and POST /v1/waitlist — with
  models mirroring the API's exact JSON contract and typed exceptions for
  validation and transport failures. The contract is pinned by this
  package's tests, not by codegen — see README.md for why.
version: 0.1.0
publish_to: none

# Deliberately pure Dart — NO flutter dependency. The client must be usable
# from any Dart context (the Flutter app, scripts, future CLI tooling), so it
# depends only on `package:http`.
environment:
  sdk: ^3.6.0

# Part of the Insolvia pub workspace (root pubspec.yaml).
resolution: workspace

dependencies:
  # The one runtime dependency: a platform-agnostic HTTP client whose
  # `http.Client` interface also gives tests a drop-in mock
  # (`package:http/testing.dart`).
  http: ^1.2.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
